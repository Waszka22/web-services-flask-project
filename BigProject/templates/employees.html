



!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h2>Employees List</h2>

    <table border="1" cellpadding="10">
        <thead>
            <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Position</th>
                <th>Department</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="employeeTableBody"></tbody>
    </table>

    <div id="editBox" style="display:none; margin-top:20px; border:1px solid black; padding:15px;">
        <h3>Edit Employee</h3>

        <input type="hidden" id="edit_id">

        <input type="text" id="edit_first_name" placeholder="First Name"><br><br>
        <input type="text" id="edit_last_name" placeholder="Last Name"><br><br>
        <input type="text" id="edit_position" placeholder="Position"><br><br>
        <input type="text" id="edit_department" placeholder="Department"><br><br>
        <input type="text" id="edit_phone" placeholder="Phone"><br><br>
        <input type="email" id="edit_email" placeholder="Email"><br><br>

        <button onclick="saveEmployee()">Save</button>
        <button onclick="closeEdit()">Cancel</button>
    </div>

    <script>
        async function loadEmployees() {
            const response = await fetch("/api/employees");
            const employees = await response.json();

            const tableBody = document.getElementById("employeeTableBody");
            tableBody.innerHTML = "";

            employees.forEach(employee => {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${employee.id}</td>
                    <td>${employee.first_name}</td>
                    <td>${employee.last_name}</td>
                    <td>${employee.position}</td>
                    <td>${employee.department}</td>
                    <td>${employee.phone}</td>
                    <td>${employee.email}</td>
                    <td>
                        <button onclick='openEdit(${JSON.stringify(employee)})'>Edit</button>
                        <button class="delete-btn" onclick="deleteEmployee(${employee.id})">Delete</button>
                    </td>
                `;

                tableBody.appendChild(row);
            });
        }

        async function deleteEmployee(id) {
            const response = await fetch(`/api/employees/${id}`, {
                method: "DELETE"
            });

            if (response.ok) {
                loadEmployees();
            } else {
                alert("Error deleting employee");
            }
        }

        function openEdit(employee) {
            document.getElementById("editBox").style.display = "block";

            document.getElementById("edit_id").value = employee.id;
            document.getElementById("edit_first_name").value = employee.first_name;
            document.getElementById("edit_last_name").value = employee.last_name;
            document.getElementById("edit_position").value = employee.position;
            document.getElementById("edit_department").value = employee.department;
            document.getElementById("edit_phone").value = employee.phone;
            document.getElementById("edit_email").value = employee.email;
        }

        function closeEdit() {
            document.getElementById("editBox").style.display = "none";
        }

        async function saveEmployee() {
            const id = document.getElementById("edit_id").value;

            const updatedEmployee = {
                first_name: document.getElementById("edit_first_name").value,
                last_name: document.getElementById("edit_last_name").value,
                position: document.getElementById("edit_position").value,
                department: document.getElementById("edit_department").value,
                phone: document.getElementById("edit_phone").value,
                email: document.getElementById("edit_email").value
            };

            const response = await fetch(`/api/employees/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(updatedEmployee)
            });

            if (response.ok) {
                closeEdit();
                loadEmployees();
            } else {
                alert("Error updating employee");
            }
        }

        loadEmployees();
    </script>
</body>
</html>
